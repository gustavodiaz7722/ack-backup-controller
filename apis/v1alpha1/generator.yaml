ignore:
  resource_names:
    - BackupPlan
    - BackupSelection
    - Framework
    - LegalHold
    - LogicallyAirGappedBackupVault
    - ReportPlan
    - RestoreAccessBackupVault
    - RestoreTestingPlan
    - RestoreTestingSelection
    - TieringConfiguration
  field_paths: []

resources:
  BackupVault:
    ignore_idempotency_token: true
    fields:
      Name:
        is_primary_key: true
        is_immutable: true
      # Cross-resource reference to KMS Key for encryption
      EncryptionKeyARN:
        references:
          resource: Key
          service_name: kms
          path: Status.ACKResourceMetadata.ARN
      # Read-only status fields from DescribeBackupVault
      EncryptionKeyType:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: EncryptionKeyType
      LockDate:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: LockDate
      Locked:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: Locked
      MaxRetentionDays:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: MaxRetentionDays
      MinRetentionDays:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: MinRetentionDays
      NumberOfRecoveryPoints:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: NumberOfRecoveryPoints
      VaultState:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: VaultState
      VaultType:
        is_read_only: true
        from:
          operation: DescribeBackupVault
          path: VaultType
    synced:
      when:
        - path: Status.VaultState
          in:
            - AVAILABLE
    renames:
      operations:
        CreateBackupVault:
          input_fields:
            BackupVaultName: Name
            BackupVaultTags: Tags
        DeleteBackupVault:
          input_fields:
            BackupVaultName: Name
        DescribeBackupVault:
          input_fields:
            BackupVaultName: Name
          output_fields:
            BackupVaultName: Name
    exceptions:
      errors:
        404:
          code: AccessDeniedException
      terminal_codes:
        - InvalidParameterValueException
        - MissingParameterValueException
        - InvalidRequestException
